name: Woodpecker Overlay Sync
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: 
      image: gentoo/stage3:amd64
      options: --user root # Ensure we can emerge tools
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Tools
        run: |
          # Use binary packages where possible to save Action minutes
          emerge --sync --quiet
          getbinpkg=y emerge -uDN --quiet \
            dev-util/pkgdev \
            dev-vcs/git \
            net-misc/curl \
            dev-python/requests
            
      - name: Run Update Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/update_overlay.py # Ensure filename matches
              - name: Setup Tools
        run: |
          getbinpkg=y emerge --sync --quiet
          getbinpkg=y emerge -uDN --quiet \
            dev-util/pkgdev \
            dev-vcs/git \
            net-misc/curl \
            dev-python/requests

      - name: Register Overlay for Portage
        run: |
          mkdir -p /etc/portage/repos.conf
          # $(pwd) points to the GitHub workspace where the repo is checked out
          echo -e "[woodpecker]\nlocation = $(pwd)\nmasters = gentoo\nauto-sync = no" > /etc/portage/repos.conf/woodpecker.conf

      - name: Run Update Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/update_overlay.py 

      - name: Manifest & Commit
        run: |
          git config --global --add safe.directory $(pwd)
          # pkgdev now knows 'woodpecker' is a local repo thanks to the step above
          pkgdev manifest
          pkgdev commit -a -m "woodpecker: automated version bump" || echo "No changes"
          git push

        
      - name: Manifest & Commit
        run: |
          git config --global user.name "woodpecker-bot"
          git config --global user.email "bot@example.com"
          git config --global --add safe.directory /__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}
          
          # Generate manifests for all new ebuilds
          pkgdev manifest
          
          # Commit using pkgdev (it handles the ChangeLog style)
          # Use --signoff if your repo requires it
          pkgdev commit -a -m "woodpecker: automated version bump" || echo "No changes to commit"
          
          git push
